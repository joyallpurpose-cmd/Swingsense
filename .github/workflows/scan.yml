name: Daily scan

on:
  schedule:
    - cron: '10 13 * * 1-5'    # 18:40 IST, Mon-Fri (after NSE delivery data)
  workflow_dispatch: {}         # manual "Run scan" button on GitHub

permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache price history
        uses: actions/cache@v4
        with:
          path: |
            scanner/market.db
            scanner/cache
          key: market-data-${{ github.run_number }}
          restore-keys: market-data-

      - name: Install dependencies
        run: pip install -r scanner/requirements.txt

      - name: Restore live data.json from published copy
        run: |
          if [ -f docs/data.json ]; then cp docs/data.json data.json;
          else cp data.example.json data.json; fi

      - name: Run scanner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scanner/scanner.py

      - name: Build static site
        run: python build_static.py

      - name: Publish
        run: |
          git config user.name  "swingsense-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "scan: $(date -u +%F)"
          git push
